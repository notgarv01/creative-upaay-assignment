<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0F172A]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Booking - Checkout</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts (Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              dark: '#080720',      // Deep navy matching mockups
              primary: '#4F46E5',   // Indigo branding accent
              bg: '#F8F9FD',        // Light body background
              textGray: '#8B98B1',  // Muted text
              cardBg: '#FFFFFF',    // White card background
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-brand-bg mx-auto h-screen shadow-2xl flex flex-col justify-between relative border-x border-slate-200/20 font-sans overflow-hidden">

  <!-- Toast Notification System -->
  <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-[#080720] text-white px-4 py-3 rounded-2xl shadow-xl flex items-center gap-2 transform -translate-y-24 opacity-0 transition-all duration-300 pointer-events-none max-w-[320px] w-[90%]">
    <div id="toast-icon" class="text-emerald-400">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd" />
      </svg>
    </div>
    <p id="toast-msg" class="text-xs font-semibold tracking-wide"></p>
  </div>

  <!-- Main Scrollable Content Area -->
  <div class="flex-grow overflow-y-auto no-scrollbar pb-4">
    
    <!-- Top Header Navigation Links -->
    <div class="px-6 pt-5 select-none shrink-0">
      <div class="flex justify-between items-center text-slate-500">
        <!-- Back Link -->
        <a id="back-link" href="../booksummarypage/summary.html" class="flex items-center gap-1 hover:text-brand-primary transition-colors font-semibold text-sm">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
          </svg>
          Back
        </a>
        <!-- Cancel Link -->
        <a href="../homepage/home.html" class="hover:text-brand-primary transition-colors font-semibold text-sm">
          Cancel
        </a>
      </div>

      <!-- Progress Bar (100%) -->
      <div class="w-full bg-[#E2E8F0] h-1.5 rounded-full mt-4 overflow-hidden">
        <div class="bg-brand-primary h-full w-[100%] rounded-full"></div>
      </div>
    </div>

    <!-- Title Header -->
    <div class="px-6 mt-4 select-none shrink-0">
      <h1 class="text-lg font-bold text-slate-800 leading-none">Checkout</h1>
    </div>

    <!-- Summary Details Block -->
    <div class="px-6 mt-4 select-none shrink-0">
      <h2 class="text-xs font-bold text-slate-800 uppercase tracking-wider leading-none">Summary</h2>
      
      <div class="flex flex-col gap-2 mt-3.5 text-[11px] text-slate-500 font-medium select-none">
        <div class="flex justify-between">
          <span id="summary-qty-label">2x Tickets</span>
          <span id="summary-cost-text">₹560</span>
        </div>
        <div class="flex justify-between">
          <span>Booking Fee</span>
          <span>₹20</span>
        </div>
        <hr class="border-slate-300/40 mt-1.5">
        <div class="flex justify-between text-xs mt-1.5 font-bold text-slate-800">
          <span>Total</span>
          <span id="summary-total-text">₹580</span>
        </div>
      </div>
    </div>

    <!-- Payment Choice Section -->
    <div class="px-6 mt-6 shrink-0">
      <h2 class="text-xs font-bold text-slate-800 uppercase tracking-wider leading-none">Choose payment method</h2>
      
      <!-- Option Selectors row -->
      <div class="flex items-center gap-6 mt-3.5 select-none">
        
        <!-- Credit/Debit Card Selector -->
        <label onclick="togglePaymentTab('card')" class="flex items-center gap-2 cursor-pointer text-xs font-semibold text-slate-800">
          <div id="radio-card" class="w-4.5 h-4.5 rounded-full border-2 border-brand-primary flex items-center justify-center">
            <div class="w-2.5 h-2.5 rounded-full bg-brand-primary"></div>
          </div>
          Credit/Debit Card
        </label>

        <!-- Mobile Wallet Selector -->
        <label onclick="togglePaymentTab('wallet')" class="flex items-center gap-2 cursor-pointer text-xs font-semibold text-slate-400">
          <div id="radio-wallet" class="w-4.5 h-4.5 rounded-full border-2 border-slate-300 flex items-center justify-center">
            <div class="w-2.5 h-2.5 rounded-full bg-transparent"></div>
          </div>
          Mobile Wallet
        </label>
        
      </div>
    </div>

    <!-- Form Section -->
    <div class="px-6 mt-4 shrink-0">
      
      <!-- Credit Card Form Box -->
      <div id="card-payment-form" class="flex flex-col gap-4">
        
        <!-- Name on Card -->
        <div class="flex flex-col gap-1.5">
          <label class="text-[10px] font-bold text-zinc-600 uppercase tracking-wide">Name on card</label>
          <input type="text" id="card-name-input" placeholder="Name on card" class="w-full bg-white border border-slate-200 rounded-xl px-3.5 py-2.5 text-xs text-slate-800 placeholder-slate-400 focus:outline-none focus:border-brand-primary transition-colors">
        </div>

        <!-- Card Number -->
        <div class="flex flex-col gap-1.5">
          <label class="text-[10px] font-bold text-zinc-600 uppercase tracking-wide">Card number</label>
          <input type="text" id="card-number-input" maxlength="19" placeholder="1234 5678 9012 3456" class="w-full bg-white border border-slate-200 rounded-xl px-3.5 py-2.5 text-xs text-slate-800 placeholder-slate-400 focus:outline-none focus:border-brand-primary transition-colors">
        </div>

        <!-- Expiry and CVC Grid -->
        <div class="grid grid-cols-2 gap-4">
          <!-- Expiry Date -->
          <div class="flex flex-col gap-1.5">
            <label class="text-[10px] font-bold text-zinc-600 uppercase tracking-wide">Expiry date</label>
            <input type="text" id="card-expiry-input" maxlength="5" placeholder="MM/YY" class="w-full bg-white border border-slate-200 rounded-xl px-3.5 py-2.5 text-xs text-slate-800 placeholder-slate-400 focus:outline-none focus:border-brand-primary transition-colors">
          </div>
          <!-- CVC/CVV -->
          <div class="flex flex-col gap-1.5">
            <label class="text-[10px] font-bold text-zinc-600 uppercase tracking-wide">CVC/CVV</label>
            <input type="text" id="card-cvc-input" maxlength="3" placeholder="CVC" class="w-full bg-white border border-slate-200 rounded-xl px-3.5 py-2.5 text-xs text-slate-800 placeholder-slate-400 focus:outline-none focus:border-brand-primary transition-colors">
          </div>
        </div>

        <!-- Checkbox save details -->
        <label class="flex items-center gap-2 cursor-pointer mt-1 select-none">
          <div id="save-checkbox" onclick="toggleSaveDetails(this)" class="w-4 h-4 rounded border border-slate-300 flex items-center justify-center bg-white transition-colors">
            <svg class="w-3 h-3 text-white hidden" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
          </div>
          <span class="text-[10px] font-semibold text-slate-700">Save payment details for the next purchase</span>
        </label>

      </div>

      <!-- Mobile Wallet Box (hidden by default) -->
      <div id="wallet-payment-form" class="hidden flex-col gap-3">
        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-wide">Select Wallet Provider</span>
        
        <!-- Providers options -->
        <div class="flex flex-col gap-2.5 select-none">
          <div onclick="selectWallet('GPay')" class="wallet-option flex items-center justify-between border border-slate-200 bg-white p-3 rounded-xl cursor-pointer hover:border-brand-primary transition-all">
            <span class="text-xs font-bold text-slate-700">Google Pay</span>
            <div class="w-4 h-4 rounded-full border border-slate-300 flex items-center justify-center select-dot"></div>
          </div>
          <div onclick="selectWallet('Paytm')" class="wallet-option flex items-center justify-between border border-slate-200 bg-white p-3 rounded-xl cursor-pointer hover:border-brand-primary transition-all">
            <span class="text-xs font-bold text-slate-700">Paytm UPI</span>
            <div class="w-4 h-4 rounded-full border border-slate-300 flex items-center justify-center select-dot"></div>
          </div>
          <div onclick="selectWallet('PhonePe')" class="wallet-option flex items-center justify-between border border-slate-200 bg-white p-3 rounded-xl cursor-pointer hover:border-brand-primary transition-all">
            <span class="text-xs font-bold text-slate-700">PhonePe</span>
            <div class="w-4 h-4 rounded-full border border-slate-300 flex items-center justify-center select-dot"></div>
          </div>
        </div>
      </div>

    </div>

  </div>

  <!-- Bottom Complete Payment Button Block -->
  <div class="bg-white border-t border-slate-100 pt-2.5 pb-2.5 px-6 z-30 shadow-[0_-4px_12px_rgba(0,0,0,0.03)] shrink-0 flex flex-col gap-2.5">
    
    <!-- Complete Payment Button -->
    <button onclick="handleCompleteCheckout()" class="w-full bg-brand-primary hover:bg-[#3B32C4] active:scale-[0.98] text-white py-3 rounded-2xl font-semibold shadow-lg shadow-indigo-500/10 hover:shadow-indigo-500/20 transition-all duration-300 text-sm tracking-wide focus:outline-none">
      Complete Payment
    </button>
    
    <!-- Tab Nav Bar Icons -->
    <div class="flex justify-around pt-1.5 select-none">
      <!-- Home Tab -->
      <a href="../homepage/home.html" class="flex flex-col items-center gap-1 text-brand-textGray hover:text-brand-primary focus:outline-none transition-colors duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
        </svg>
      </a>
      <!-- Ticket Tab -->
      <a href="../ticketdetails/ticket.html" class="flex flex-col items-center gap-1 text-brand-textGray hover:text-brand-primary focus:outline-none transition-colors duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 6v.75m0 3v.75m0 3v.75m0 3V18m-9-12h12c.621 0 1.125.504 1.125 1.125V17c0 .621-.504 1.125-1.125 1.125h-12A1.125 1.125 0 013 17V7.125C3 6.504 3.504 6 4.125 6z" />
        </svg>
      </a>
      <!-- Heart Tab -->
      <button class="flex flex-col items-center gap-1 text-brand-textGray hover:text-brand-primary focus:outline-none transition-colors duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
        </svg>
      </button>
      <!-- Profile Tab -->
      <button class="flex flex-col items-center gap-1 text-brand-textGray hover:text-brand-primary focus:outline-none transition-colors duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
        </svg>
      </button>
    </div>
    
  </div>

  <!-- JavaScript Form logic -->
  <!-- JavaScript Form logic -->
  <script src="script.js" defer></script>
</body>
</html>
