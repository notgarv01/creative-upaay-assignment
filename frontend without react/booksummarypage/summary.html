<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0F172A]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Booking - Booking Summary</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts (Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              dark: '#080720',      // Deep navy matching mockups
              primary: '#4F46E5',   // Indigo branding accent
              bg: '#F8F9FD',        // Light body background
              textGray: '#8B98B1',  // Muted text
              cardBg: '#FFFFFF',    // White card background
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-brand-bg mx-auto h-screen shadow-2xl flex flex-col justify-between relative border-x border-slate-200/20 font-sans overflow-hidden">

  <!-- Toast Notification System -->
  <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-[#080720] text-white px-4 py-3 rounded-2xl shadow-xl flex items-center gap-2 transform -translate-y-24 opacity-0 transition-all duration-300 pointer-events-none max-w-[320px] w-[90%]">
    <div id="toast-icon" class="text-emerald-400">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd" />
      </svg>
    </div>
    <p id="toast-msg" class="text-xs font-semibold tracking-wide"></p>
  </div>

  <!-- Main Scrollable Content Area -->
  <div class="flex-grow overflow-y-auto no-scrollbar pb-4">
    
    <!-- Top Header Navigation Links -->
    <div class="px-6 pt-5 select-none shrink-0">
      <div class="flex justify-between items-center text-slate-500">
        <!-- Back Link -->
        <a id="back-link" href="../selectseats/seats.html" class="flex items-center gap-1 hover:text-brand-primary transition-colors font-semibold text-sm">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
          </svg>
          Back
        </a>
        <!-- Cancel Link -->
        <a href="../homepage/home.html" class="hover:text-brand-primary transition-colors font-semibold text-sm">
          Cancel
        </a>
      </div>

      <!-- Progress Bar (80%) -->
      <div class="w-full bg-[#E2E8F0] h-1.5 rounded-full mt-4 overflow-hidden">
        <div class="bg-brand-primary h-full w-[80%] rounded-full"></div>
      </div>
    </div>

    <!-- Booking Summary Main Title -->
    <div class="px-6 mt-4 select-none shrink-0">
      <h1 class="text-lg font-bold text-slate-800 leading-none">Booking Summary</h1>
    </div>

    <!-- Hero Image Banner Card -->
    <div class="px-6 mt-4 select-none shrink-0">
      <div class="w-full h-[155px] overflow-hidden rounded-2xl shadow-[0_4px_16px_rgba(0,0,0,0.02)] border border-slate-100/50">
        <img src="../images/summary_hero.png" alt="Meg 2 Movie Scene" class="w-full h-full object-cover">
      </div>
    </div>

    <!-- Movie Title & Location Info -->
    <div class="px-6 mt-4 shrink-0">
      <h2 class="text-md font-bold text-slate-800 leading-tight">Meg 2: The Trench</h2>
      
      <!-- Metadata Row (inline labels) -->
      <div class="flex flex-row items-center gap-3.5 mt-2 select-none">
        <!-- Theater details -->
        <div class="flex items-center gap-1 text-[11px] font-semibold text-brand-textGray">
          <svg class="w-3.5 h-3.5 text-slate-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
          </svg>
          <span id="theater-text">The Grandview</span>
        </div>
        <!-- Date details -->
        <div class="flex items-center gap-1 text-[11px] font-semibold text-brand-textGray">
          <svg class="w-3.5 h-3.5 text-slate-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
          <span id="date-text">Friday, October 10</span>
        </div>
      </div>

      <!-- Show Details inline row (Screen, Time, Format) -->
      <div class="flex items-center gap-4 mt-3 select-none text-[11px] font-semibold text-slate-800">
        <div class="flex items-center gap-1">
          <span id="screen-text">Screen 1</span>
        </div>
        <span class="text-brand-primary" id="time-text">10:00 AM</span>
        <span class="text-brand-textGray" id="format-text">2D</span>
      </div>

      <!-- Seats pill badge block -->
      <div class="flex items-center gap-2.5 mt-3 select-none text-[11px] font-semibold text-slate-800">
        <span class="text-zinc-800">Seats</span>
        <div id="seats-list-container" class="flex flex-wrap gap-1.5">
          <!-- Populated programmatically, defaults shown -->
          <span class="bg-slate-200 text-slate-600 px-2 py-0.5 rounded-md font-bold text-[9px]">J9</span>
          <span class="bg-slate-200 text-slate-600 px-2 py-0.5 rounded-md font-bold text-[9px]">J10</span>
        </div>
      </div>
    </div>

    <!-- Booking Receipts & cost calculations -->
    <div class="px-6 mt-6 shrink-0 flex flex-col gap-2.5 text-[11px] text-zinc-600 font-semibold select-none">
      <div class="flex justify-between">
        <span id="tickets-qty-label">2x Tickets</span>
        <span id="tickets-cost-text" class="font-semibold text-slate-800">₹560</span>
      </div>
      <div class="flex justify-between text-slate-800">
        <span>Booking Fee</span>
        <span>₹20</span>
      </div>
      <hr class="border-slate-300/50 mt-1">
      <div class="flex justify-between text-xs mt-1">
        <span class="font-bold text-slate-800">Total</span>
        <span id="payable-total-text" class="font-bold text-slate-800">₹580</span>
      </div>
    </div>

  </div>

  <!-- Bottom Action Block (Sticky to Container Bottom) -->
  <div class="bg-white border-t border-slate-100 pt-2.5 pb-2.5 px-6 z-30 shadow-[0_-4px_12px_rgba(0,0,0,0.03)] shrink-0 flex flex-col gap-2.5">
    
    <!-- Proceed to Payment Action Button -->
    <button onclick="handleProceedPayment()" class="w-full bg-brand-primary hover:bg-[#3B32C4] active:scale-[0.98] text-white py-3 rounded-2xl font-semibold shadow-lg shadow-indigo-500/10 hover:shadow-indigo-500/20 transition-all duration-300 text-sm tracking-wide focus:outline-none">
      Proceed to Payment
    </button>
    
    <!-- Tab Nav Bar Icons -->
    <div class="flex justify-around pt-1.5 select-none">
      <!-- Home Tab -->
      <a href="../homepage/home.html" class="flex flex-col items-center gap-1 text-brand-textGray hover:text-brand-primary focus:outline-none transition-colors duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
        </svg>
      </a>
      <!-- Ticket Tab -->
      <a href="../ticketdetails/ticket.html" class="flex flex-col items-center gap-1 text-brand-textGray hover:text-brand-primary focus:outline-none transition-colors duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 6v.75m0 3v.75m0 3v.75m0 3V18m-9-12h12c.621 0 1.125.504 1.125 1.125V17c0 .621-.504 1.125-1.125 1.125h-12A1.125 1.125 0 013 17V7.125C3 6.504 3.504 6 4.125 6z" />
        </svg>
      </a>
      <!-- Heart Tab -->
      <button class="flex flex-col items-center gap-1 text-brand-textGray hover:text-brand-primary focus:outline-none transition-colors duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
        </svg>
      </button>
      <!-- Profile Tab -->
      <button class="flex flex-col items-center gap-1 text-brand-textGray hover:text-brand-primary focus:outline-none transition-colors duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
        </svg>
      </button>
    </div>
    
  </div>

  <!-- Javascript dynamic content parser -->
  <script src="script.js" defer></script>
</body>
</html>
