<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0F172A]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Upaay - Hiring Assignment</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts (Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              dark: '#080720',      // Deep navy matching left sofa in logo
              primary: '#4F46E5',   // Indigo matching right sofa in logo
              bg: '#F8F9FD',        // Light body background from mockup
              tabBg: '#EBECEF',     // Inactive tab container background
              textGray: '#8B98B1',  // Muted grey placeholder/label text
              border: '#CFD4E2',    // Light grey border line
              borderFocus: '#4F46E5'
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-brand-bg mx-auto min-h-screen shadow-2xl flex flex-col justify-between py-10 px-8 relative overflow-x-hidden font-sans border-x border-slate-200/20">

  <!-- Toast Notification System -->
  <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-[#080720] text-white px-4 py-3 rounded-2xl shadow-xl flex items-center gap-2 transform -translate-y-24 opacity-0 transition-all duration-300 pointer-events-none max-w-[320px] w-[90%]">
    <div id="toast-icon" class="text-emerald-400">
      <!-- Checked Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd" />
      </svg>
    </div>
    <p id="toast-msg" class="text-xs font-semibold tracking-wide"></p>
  </div>

  <!-- Top Section (Logo & Header) -->
  <div class="flex flex-col items-center">
    <!-- Brand Logo -->
    <div class="h-16 flex items-center justify-center mb-4 transition-transform duration-300 hover:scale-105">
      <img src="../../images/login_logo.png" alt="Creative Upaay Logo" class="h-full w-auto object-contain">
    </div>
    
    <!-- Header Title -->
    <h1 class="text-2xl font-bold text-center text-brand-dark leading-[1.2] tracking-tight">
      Creative Upaay<br>Hiring Assignment
    </h1>

    <!-- Tabs Container -->
    <div class="relative flex bg-[#EBECEF] p-1 rounded-2xl w-full mt-10 select-none">
      <!-- Sliding active highlight -->
      <div id="tab-highlight" class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-white rounded-xl shadow-sm transition-all duration-300 ease-out transform"></div>
      
      <!-- Login Tab Button -->
      <button id="tab-login" onclick="switchTab('login')" class="relative z-10 flex-1 py-3 text-center text-sm font-bold transition-colors duration-300 text-brand-dark">
        Login
      </button>
      
      <!-- Sign Up Tab Button -->
      <button id="tab-signup" onclick="switchTab('signup')" class="relative z-10 flex-1 py-3 text-center text-sm font-bold transition-colors duration-300 text-brand-textGray">
        Sign Up
      </button>
    </div>
  </div>

  <!-- Middle Section (Forms Sliding Content) -->
  <div class="relative overflow-hidden w-full flex-grow mt-8 mb-8 min-h-[260px] flex items-center">
    <div id="forms-slider" class="flex w-[200%] shrink-0 transition-transform duration-500 ease-out transform translate-x-0">
      
      <!-- LOGIN FORM -->
      <form id="form-login" class="w-1/2 px-0.5 shrink-0 flex flex-col gap-6" onsubmit="handleLogin(event)">
        <!-- Email Input -->
        <div class="relative w-full">
          <input type="email" id="login-email" required placeholder=" " 
                 class="peer w-full bg-transparent border-b border-brand-border focus:border-brand-primary py-3 text-brand-dark transition-colors duration-200 text-sm placeholder-transparent">
          <label for="login-email" 
                 class="absolute left-0 top-3 text-brand-textGray pointer-events-none transition-all duration-300 text-sm">
            Email ID
          </label>
        </div>
        
        <!-- Password Input -->
        <div class="relative w-full">
          <input type="password" id="login-password" required placeholder=" " 
                 class="peer w-full bg-transparent border-b border-brand-border focus:border-brand-primary py-3 pr-10 text-brand-dark transition-colors duration-200 text-sm placeholder-transparent">
          <label for="login-password" 
                 class="absolute left-0 top-3 text-brand-textGray pointer-events-none transition-all duration-300 text-sm">
            Password
          </label>
          <button type="button" onclick="togglePassword('login-password', this)" class="absolute right-0 top-3 text-[#A0ABC0] hover:text-brand-primary transition-colors p-1">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-4 h-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </button>
        </div>
      </form>

      <!-- SIGN UP FORM -->
      <form id="form-signup" class="w-1/2 px-0.5 shrink-0 flex flex-col gap-5" onsubmit="handleSignUp(event)">
        <!-- Name Input -->
        <div class="relative w-full">
          <input type="text" id="signup-name" required placeholder=" " 
                 class="peer w-full bg-transparent border-b border-brand-border focus:border-brand-primary py-2.5 text-brand-dark transition-colors duration-200 text-sm placeholder-transparent">
          <label for="signup-name" 
                 class="absolute left-0 top-2.5 text-brand-textGray pointer-events-none transition-all duration-300 text-sm">
            Name
          </label>
        </div>

        <!-- Email Input -->
        <div class="relative w-full">
          <input type="email" id="signup-email" required placeholder=" " 
                 class="peer w-full bg-transparent border-b border-brand-border focus:border-brand-primary py-2.5 text-brand-dark transition-colors duration-200 text-sm placeholder-transparent">
          <label for="signup-email" 
                 class="absolute left-0 top-2.5 text-brand-textGray pointer-events-none transition-all duration-300 text-sm">
            Email ID
          </label>
        </div>
        
        <!-- Password Input -->
        <div class="relative w-full">
          <input type="password" id="signup-password" required placeholder=" " 
                 class="peer w-full bg-transparent border-b border-brand-border focus:border-brand-primary py-2.5 pr-10 text-brand-dark transition-colors duration-200 text-sm placeholder-transparent">
          <label for="signup-password" 
                 class="absolute left-0 top-2.5 text-brand-textGray pointer-events-none transition-all duration-300 text-sm">
            Password
          </label>
          <button type="button" onclick="togglePassword('signup-password', this)" class="absolute right-0 top-2 text-[#A0ABC0] hover:text-brand-primary transition-colors p-1">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-4 h-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </button>
        </div>

        <!-- Confirm Password Input -->
        <div class="relative w-full">
          <input type="password" id="signup-confirm" required placeholder=" " 
                 class="peer w-full bg-transparent border-b border-brand-border focus:border-brand-primary py-2.5 pr-10 text-brand-dark transition-colors duration-200 text-sm placeholder-transparent">
          <label for="signup-confirm" 
                 class="absolute left-0 top-2.5 text-brand-textGray pointer-events-none transition-all duration-300 text-sm">
            Confirm Password
          </label>
          <button type="button" onclick="togglePassword('signup-confirm', this)" class="absolute right-0 top-2 text-[#A0ABC0] hover:text-brand-primary transition-colors p-1">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-4 h-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </button>
        </div>
      </form>

    </div>
  </div>

  <!-- Bottom Section (Action Button) -->
  <div class="w-full">
    <!-- Single Action Button mapped to the active form using form attribute -->
    <button id="submit-btn" type="submit" form="form-login" 
            class="w-full bg-brand-primary hover:bg-[#3B32C4] active:scale-[0.98] text-white py-4 rounded-2xl font-semibold shadow-lg shadow-indigo-500/10 hover:shadow-indigo-500/20 transition-all duration-300 text-base tracking-wide">
      Login
    </button>
  </div>

  <!-- JavaScript For Tab Toggling & Interactive States -->
  <script src="script.js" defer></script>
</body>
</html>
