<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0F172A]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Booking - Select Seats</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts (Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              dark: '#080720',      // Deep navy matching mockups
              primary: '#4F46E5',   // Indigo branding accent
              bg: '#F8F9FD',        // Light body background
              textGray: '#8B98B1',  // Muted text
              cardBg: '#FFFFFF',    // White card background
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-brand-bg mx-auto h-screen shadow-2xl flex flex-col justify-between relative border-x border-slate-200/20 font-sans overflow-hidden">

  <!-- Toast Notification System -->
  <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-[#080720] text-white px-4 py-3 rounded-2xl shadow-xl flex items-center gap-2 transform -translate-y-24 opacity-0 transition-all duration-300 pointer-events-none max-w-[320px] w-[90%]">
    <div id="toast-icon" class="text-emerald-400">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd" />
      </svg>
    </div>
    <p id="toast-msg" class="text-xs font-semibold tracking-wide"></p>
  </div>

  <!-- Main Content Scroll Area -->
  <div class="flex-grow overflow-y-auto no-scrollbar pb-2">
    
    <!-- Top Header Navigation -->
    <div class="px-6 pt-5 select-none shrink-0">
      <div class="flex justify-between items-center text-slate-500">
        <!-- Back Link -->
        <a id="back-link" href="schedulepage/schedule.html" class="flex items-center gap-1 hover:text-brand-primary transition-colors font-semibold text-sm">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
          </svg>
          Back
        </a>
        <!-- Cancel Link -->
        <a href="homepage/home.html" class="hover:text-brand-primary transition-colors font-semibold text-sm">
          Cancel
        </a>
      </div>

      <!-- Progress Bar (60%) -->
      <div class="w-full bg-[#E2E8F0] h-1.5 rounded-full mt-4 overflow-hidden">
        <div class="bg-brand-primary h-full w-[60%] rounded-full"></div>
      </div>

      <!-- Screen details title -->
      <div class="flex items-end justify-between mt-4">
        <div>
          <h1 class="text-lg font-bold text-slate-800 leading-none">Select Seats</h1>
          <p class="text-xs font-semibold text-brand-textGray mt-2">
            <span id="screen-badge-text">Screen 1</span>
            <span id="time-badge-text" class="text-brand-primary ml-1">10:00 AM</span>
          </p>
        </div>
        
        <!-- Dynamic Price Tag -->
        <div class="text-right select-none">
          <span id="price-total-tag" class="text-md font-bold text-slate-800">₹560</span>
        </div>
      </div>
    </div>

    <!-- Screen representation (Arc) -->
    <div class="px-6 mt-1 flex flex-col items-center select-none shrink-0">
      <!-- Curved SVG Line for Cinema Screen -->
      <svg class="w-[90%] h-8 text-slate-300" viewBox="0 0 100 30" preserveAspectRatio="none" fill="none">
        <path d="M 2 28 Q 50 0 98 28" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
      </svg>
      <span class="text-[9px] tracking-[0.25em] font-bold text-slate-400 uppercase mt-1">Screen</span>
    </div>

    <!-- Seat Selector Grid Map -->
    <div class="px-6 mt-5 overflow-x-auto no-scrollbar scroll-smooth">
      <div class="flex flex-col gap-[7.5px] min-w-[360px]">
        
        <!-- Helper macro to generate rows with sticky inline alphabets -->
        <!-- Row A-G (10 seats visible) -->
        <div id="row-A" class="flex items-center gap-1.5"></div>
        <div id="row-B" class="flex items-center gap-1.5"></div>
        <div id="row-C" class="flex items-center gap-1.5"></div>
        <div id="row-D" class="flex items-center gap-1.5"></div>
        <div id="row-E" class="flex items-center gap-1.5"></div>
        <div id="row-F" class="flex items-center gap-1.5"></div>
        <div id="row-G" class="flex items-center gap-1.5"></div>

        <!-- Row H with pre-occupied layout -->
        <div id="row-H" class="flex items-center gap-1.5 mb-4"></div>

        <!-- Rows J-M (12 seats visible) -->
        <div id="row-J" class="flex items-center gap-1.5"></div>
        <div id="row-K" class="flex items-center gap-1.5"></div>
        <div id="row-L" class="flex items-center gap-1.5"></div>
        <div id="row-M" class="flex items-center gap-1.5"></div>

      </div>
    </div>

    <!-- Color Legend Indicators -->
    <div class="px-6 mt-5 flex justify-center gap-6 text-[11px] font-medium text-slate-500 select-none shrink-0">
      <div class="flex items-center gap-1.5">
        <div class="w-4 h-4 bg-white border border-slate-200 rounded-md"></div>
        Available
      </div>
      <div class="flex items-center gap-1.5">
        <div class="w-4 h-4 bg-slate-400 rounded-md"></div>
        Occupied
      </div>
      <div class="flex items-center gap-1.5">
        <div class="w-4 h-4 bg-brand-primary rounded-md"></div>
        Selected
      </div>
    </div>

  </div>

  <!-- Bottom Checkout Trigger Bar -->
  <div class="bg-white border-t border-slate-100 pt-2.5 pb-2.5 px-6 z-30 shadow-[0_-4px_12px_rgba(0,0,0,0.03)] shrink-0 flex flex-col gap-2.5">
    
    <!-- View Booking Summary Button -->
    <button onclick="handleViewSummary()" class="w-full bg-brand-primary hover:bg-[#3B32C4] active:scale-[0.98] text-white py-3 rounded-2xl font-semibold shadow-lg shadow-indigo-500/10 hover:shadow-indigo-500/20 transition-all duration-300 text-sm tracking-wide focus:outline-none">
      View Booking Summary
    </button>
    
    <!-- Tab Nav Icons -->
    <div class="flex justify-around pt-1.5 select-none">
      <!-- Home Tab -->
      <a href="../homepage/home.html" class="flex flex-col items-center gap-1 text-brand-textGray hover:text-brand-primary focus:outline-none transition-colors duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
        </svg>
      </a>
      <!-- Ticket Tab -->
      <a href="../ticketdetails/ticket.html" class="flex flex-col items-center gap-1 text-brand-textGray hover:text-brand-primary focus:outline-none transition-colors duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 6v.75m0 3v.75m0 3v.75m0 3V18m-9-12h12c.621 0 1.125.504 1.125 1.125V17c0 .621-.504 1.125-1.125 1.125h-12A1.125 1.125 0 013 17V7.125C3 6.504 3.504 6 4.125 6z" />
        </svg>
      </a>
      <!-- Heart Tab -->
      <button class="flex flex-col items-center gap-1 text-brand-textGray hover:text-brand-primary focus:outline-none transition-colors duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
        </svg>
      </button>
      <!-- Profile Tab -->
      <button class="flex flex-col items-center gap-1 text-brand-textGray hover:text-brand-primary focus:outline-none transition-colors duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
        </svg>
      </button>
    </div>
    
  </div>



  <!-- Javascript Logic -->
  <script src="script.js" defer></script>
</body>
</html>
